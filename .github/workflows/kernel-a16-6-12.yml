name: "🏗️ 内核构建 - Mi17 Ultra / Android16 / GKI 6.12"

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: "KernelSU 变体"
        required: true
        type: choice
        options:
          - Next
        default: Next

      enable_droidspaces:
        description: "启用 Droidspaces 容器支持"
        required: true
        type: boolean
        default: true

      enable_susfs:
        description: "启用 SUSFS（首阶段禁用，与 Droidspaces 存在挂载冲突）"
        required: true
        type: boolean
        default: false

      sub_level:
        description: "指定单个 sub_level（留空=全矩阵，调试时填如 69）"
        required: false
        type: string
        default: ""

jobs:
  # ── 动态生成矩阵 ─────────────────────────────
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: 生成编译矩阵
        id: gen
        run: |
          SINGLE="${{ inputs.sub_level }}"
          if [ -n "$SINGLE" ]; then
            echo "matrix={\"include\":[{\"sub_level\":\"${SINGLE}\",\"os_patch_level\":\"2026-03\"}]}" >> $GITHUB_OUTPUT
          else
            cat >> $GITHUB_OUTPUT << 'EOF'
          cat >> $GITHUB_OUTPUT << 'EOF'
          matrix={"include":[
            {"sub_level":"23","os_patch_level":"2025-06"},
            {"sub_level":"30","os_patch_level":"2025-07"},
            {"sub_level":"38","os_patch_level":"2025-09"},
            {"sub_level":"58","os_patch_level":"2025-12"},
            {"sub_level":"69","os_patch_level":"2026-03"}
          ]}
          EOF
          fi

  # ── 并行编译 ─────────────────────────────────
  build:
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      kernel_version: "6.12"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: ${{ inputs.ksu_variant }}
      enable_droidspaces: ${{ inputs.enable_droidspaces }}
      enable_susfs: ${{ inputs.enable_susfs }}
