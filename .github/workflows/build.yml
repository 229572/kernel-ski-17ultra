name: "build"

on:
  workflow_call:
    inputs:
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      ksu_variant:
        required: true
        type: string
        default: "Next"
      enable_droidspaces:
        required: false
        type: boolean
        default: true
      enable_susfs:
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: "GKI ${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}"
    runs-on: ubuntu-latest

    steps:
      # ── 0. 系统准备 ────────────────────────────────────────
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 清理磁盘
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 git curl wget make bc bison flex \
            libssl-dev libelf-dev cpio pahole zip unzip \
            libarchive-tools zstd libc6-dev \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu

      # ── 1. repo 工具 + 拉取内核源码 ────────────────────────
      - name: 初始化 repo
        run: |
          mkdir -p $HOME/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo > $HOME/bin/repo
          chmod +x $HOME/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 检出仓库（获取回退脚本）
        uses: actions/checkout@v4
        with:
          path: repo_scripts

      - name: 拉取 GKI ${{ inputs.kernel_version }}.${{ inputs.sub_level }} 源码
        run: |
          KERNEL_ROOT="$GITHUB_WORKSPACE/kernel_src"
          mkdir -p "$KERNEL_ROOT"

          # 加载回退函数
          source "$GITHUB_WORKSPACE/repo_scripts/scripts/repo_sync_fallback.sh"

          # 自动 repo sync → 失败则 git clone 镜像回退
          sync_kernel_source \
            "$KERNEL_ROOT" \
            "${{ inputs.kernel_version }}" \
            "${{ inputs.os_patch_level }}"

          echo "KERNEL_ROOT=$KERNEL_ROOT" >> $GITHUB_ENV
          echo "DEFCONFIG=$KERNEL_ROOT/common/arch/arm64/configs/gki_defconfig" >> $GITHUB_ENV

      # ── 2. KernelSU-Next ────────────────────────────────────
      - name: 集成 KernelSU-Next
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          echo "=== 集成 KernelSU-Next ==="
          curl -LSs \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
            | bash -s next

          KSU_VER=$(cd KernelSU && git describe --tags --abbrev=0 2>/dev/null || echo "unknown")
          echo "KSU_VERSION=$KSU_VER" >> $GITHUB_ENV
          echo "KernelSU-Next 版本: $KSU_VER"

      # ── 3. Droidspaces 补丁 ─────────────────────────────────
      - name: 克隆 Droidspaces-OSS
        if: ${{ inputs.enable_droidspaces }}
        run: |
          git clone --depth=1 \
            https://github.com/ravindu644/Droidspaces-OSS.git \
            /tmp/Droidspaces-OSS
          echo "DROIDSPACES_PATCHES=/tmp/Droidspaces-OSS/Documentation/resources/kernel-patches/GKI" >> $GITHUB_ENV

      - name: 应用 sysvipc kABI 修复补丁
        if: ${{ inputs.enable_droidspaces }}
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          PATCH="$DROIDSPACES_PATCHES/kernel-6.12/001.GKI-6.12-or-above-fix_sysvipc_kabi.patch"
          echo "=== 应用 Droidspaces sysvipc kABI 补丁 ==="
          if [ ! -f "$PATCH" ]; then
            echo "::error::补丁不存在: $PATCH"
            exit 1
          fi
          if ! patch -p1 --forward < "$PATCH"; then
            echo "::warning::补丁已应用或上下文不匹配，继续"
          fi

          # 修复 6.12 rust_binder.ko 的符号导出问题
          if [ -f "ipc/msgutil.c" ] && \
             ! grep -qF 'EXPORT_SYMBOL(init_ipc_ns);' ipc/msgutil.c; then
            sed -i '/^struct msg_msgseg {/i EXPORT_SYMBOL(init_ipc_ns);' ipc/msgutil.c
            echo "已补充 init_ipc_ns 导出"
          fi
          if [ -f "ipc/namespace.c" ] && \
             ! grep -qF 'EXPORT_SYMBOL(put_ipc_ns);' ipc/namespace.c; then
            sed -i '/^static struct ns_common \*ipcns_get(/i EXPORT_SYMBOL(put_ipc_ns);' ipc/namespace.c
            echo "已补充 put_ipc_ns 导出"
          fi

      - name: 注入 Droidspaces 内核配置
        if: ${{ inputs.enable_droidspaces }}
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          echo "=== 注入 Droidspaces CONFIG ==="
          enable_cfg() {
            local c="$1"
            if grep -q "^${c}=y" "$DEFCONFIG"; then
              echo "  已有: $c"
            elif grep -q "^# ${c} is not set" "$DEFCONFIG"; then
              sed -i "s/^# ${c} is not set$/${c}=y/" "$DEFCONFIG"
              echo "  切换: $c"
            else
              echo "${c}=y" >> "$DEFCONFIG"
              echo "  追加: $c"
            fi
          }

          enable_cfg CONFIG_NAMESPACES
          enable_cfg CONFIG_UTS_NS
          enable_cfg CONFIG_IPC_NS
          enable_cfg CONFIG_USER_NS
          enable_cfg CONFIG_PID_NS
          enable_cfg CONFIG_NET_NS
          enable_cfg CONFIG_SYSVIPC
          enable_cfg CONFIG_POSIX_MQUEUE
          enable_cfg CONFIG_DEVTMPFS
          enable_cfg CONFIG_CGROUPS
          enable_cfg CONFIG_CGROUP_DEVICE
          enable_cfg CONFIG_CGROUP_FREEZER
          enable_cfg CONFIG_CGROUP_PIDS
          enable_cfg CONFIG_MEMCG

          # 关闭 Android 偏执网络控制（容器联网必须）
          sed -i 's/^CONFIG_ANDROID_PARANOID_NETWORK=y/# CONFIG_ANDROID_PARANOID_NETWORK is not set/' \
            "$DEFCONFIG" && echo "  关闭: CONFIG_ANDROID_PARANOID_NETWORK" || true

      # ── 4. HMBird 补丁（小米 HyperOS 专用）───────────────────
      - name: 应用 HMBird 补丁
        working-directory: ${{ env.KERNEL_ROOT }}/common/drivers
        run: |
          echo "=== 应用 HMBird 补丁（防止 HyperOS 限制自定义内核性能）==="
          curl -LSs \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/config/hmbird_patch.c" \
            -o hmbird_patch.c
          echo "obj-y += hmbird_patch.o" >> Makefile
          echo "HMBird 补丁已注入"

      # ── 5. 编译 ─────────────────────────────────────────────
      - name: 编译内核
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          echo "=== 开始编译 GKI ${{ inputs.kernel_version }}.${{ inputs.sub_level }} ==="

          make ARCH=arm64 \
               LLVM=1 LLVM_IAS=1 \
               O=out \
               gki_defconfig

          make ARCH=arm64 \
               LLVM=1 LLVM_IAS=1 \
               O=out \
               -j$(nproc --all) \
               Image

          echo "KERNEL_IMAGE=${{ env.KERNEL_ROOT }}/common/out/arch/arm64/boot/Image" >> $GITHUB_ENV

      # ── 6. AnyKernel3 打包 ──────────────────────────────────
      - name: 打包 AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/WildKernels/AnyKernel3.git \
            -b android16-6.12 \
            /tmp/AnyKernel3 2>/dev/null || \
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3.git \
            /tmp/AnyKernel3

          cp "$KERNEL_IMAGE" /tmp/AnyKernel3/Image

          PKG="AnyKernel3-MI17Ultra-android16-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-$(date +%Y%m%d%H%M)"
          cd /tmp/AnyKernel3
          zip -r9 "/tmp/${PKG}.zip" . -x "*.git*" "*.github*"

          echo "PKG_PATH=/tmp/${PKG}.zip" >> $GITHUB_ENV
          echo "PKG_NAME=${PKG}" >> $GITHUB_ENV

      # ── 7. 上传产物 ─────────────────────────────────────────
      - name: 上传刷入包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: ${{ env.PKG_PATH }}
          retention-days: 7

      - name: 写入构建摘要
        run: |
          {
            echo "## ✅ 编译成功"
            echo ""
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 机型 | Xiaomi 17 Ultra (popsicle) |"
            echo "| 内核 | GKI ${{ inputs.kernel_version }}.${{ inputs.sub_level }} |"
            echo "| 安全补丁 | ${{ inputs.os_patch_level }} |"
            echo "| KernelSU | Next ($KSU_VERSION) |"
            echo "| Droidspaces | ${{ inputs.enable_droidspaces }} |"
            echo "| SUSFS | ${{ inputs.enable_susfs }} |"
            echo "| 刷入包 | $PKG_NAME |"
          } >> $GITHUB_STEP_SUMMARY
